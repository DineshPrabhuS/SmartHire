spring.application.name=job
server.port=${PORT:8080}


# MySQL database connection properties
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/portal_new}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Root#2704}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA (Java Persistence API) and Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true